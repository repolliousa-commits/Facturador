<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Facturas</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-zinc-100">
    <div id="root">
        <div class="flex flex-col items-center justify-center min-h-screen font-sans">
            <div class="w-10 h-10 border-4 border-black border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-zinc-500 font-medium">Cargando sistema...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Iconos SVG Integrados para evitar errores de librerías externas
        const Icons = {
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Download: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
            User: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Package: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.28"></line><polyline points="3.29 7 12 12 20.71 7"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>,
            Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        };

        const Input = ({ label, value, onChange, type = "text" }) => (
            <div className="w-full">
                <label className="block text-[10px] font-bold text-zinc-400 uppercase mb-1 ml-1 tracking-wider">{label}</label>
                <input
                    type={type}
                    value={value}
                    onChange={(e) => onChange(e.target.value)}
                    className="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-sm font-medium focus:ring-2 focus:ring-black outline-none transition-all"
                />
            </div>
        );

        const App = () => {
            const [isGenerating, setIsGenerating] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            const [showTax, setShowTax] = useState(true);

            const [invoiceData, setInvoiceData] = useState({
                invoiceNumber: '',
                orderNumber: '',
                issueDate: new Date().toISOString().split('T')[0],
                taxRate: 18, 
                conditions: '',
                dispatchedBy: '',
                receivedBy: '',
                client: { name: '', address: '' },
                items: [{ id: '1', description: '', quantity: '', price: '' }]
            });

            const handleInputChange = (field, value) => setInvoiceData(prev => ({ ...prev, [field]: value }));
            const handleNestedChange = (cat, field, value) => setInvoiceData(prev => ({ ...prev, [cat]: { ...prev[cat], [field]: value } }));
            
            const addItem = () => setInvoiceData(prev => ({ 
                ...prev, 
                items: [...prev.items, { id: Math.random().toString(36).substr(2, 9), description: '', quantity: '', price: '' }] 
            }));

            const removeItem = (id) => {
                if (invoiceData.items.length > 1) {
                    setInvoiceData(prev => ({ ...prev, items: prev.items.filter(item => item.id !== id) }));
                }
            };

            const updateItem = (id, field, value) => {
                setInvoiceData(prev => ({
                    ...prev,
                    items: prev.items.map(item => item.id === id ? { ...item, [field]: value } : item)
                }));
            };

            const totals = useMemo(() => {
                const subtotal = invoiceData.items.reduce((acc, item) => acc + ((parseFloat(item.quantity) || 0) * (parseFloat(item.price) || 0)), 0);
                const taxAmount = showTax ? (subtotal * (parseFloat(invoiceData.taxRate) || 0)) / 100 : 0;
                return { subtotal, taxAmount, total: subtotal + taxAmount };
            }, [invoiceData, showTax]);

            const handleDownloadPDF = async () => {
                setIsGenerating(true);
                const element = document.getElementById('printable-invoice');
                const opt = {
                    margin: 0,
                    filename: `Factura_${invoiceData.invoiceNumber || 'Recibo'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                try {
                    await window.html2pdf().set(opt).from(element).save();
                    setShowSuccess(true);
                    setTimeout(() => setShowSuccess(false), 3000);
                } catch (error) { 
                    console.error(error);
                } finally { 
                    setIsGenerating(false); 
                }
            };

            return (
                <div className="min-h-screen p-2 md:p-4 font-sans text-zinc-900">
                    <div className="max-w-6xl mx-auto space-y-4">
                        <header className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-5 rounded-2xl shadow-sm print:hidden">
                            <div>
                                <h1 className="text-xl font-bold">Generador de Facturas</h1>
                                <p className="text-xs text-zinc-400">Versión estable para GitHub Pages</p>
                            </div>
                            <button onClick={handleDownloadPDF} disabled={isGenerating} className="flex items-center gap-2 bg-black text-white px-6 py-3 rounded-xl font-bold hover:bg-zinc-800 transition-all active:scale-95 disabled:bg-zinc-400">
                                {isGenerating ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <Icons.Download />}
                                {isGenerating ? 'Generando...' : 'Descargar PDF'}
                            </button>
                        </header>

                        {showSuccess && (
                            <div className="bg-green-600 text-white px-4 py-2 rounded-xl flex items-center gap-2 justify-center animate-bounce print:hidden">
                                <Icons.Check /> ¡PDF Guardado!
                            </div>
                        )}

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <aside className="lg:col-span-4 space-y-4 print:hidden">
                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-zinc-200">
                                    <div className="flex justify-between items-center">
                                        <span className="text-xs font-bold uppercase text-zinc-400">Impuestos (ITBIS)</span>
                                        <button onClick={() => setShowTax(!showTax)} className={`px-4 py-1 rounded-full text-[10px] font-black transition-all ${showTax ? 'bg-black text-white' : 'bg-zinc-200 text-zinc-500'}`}>
                                            {showTax ? 'ON' : 'OFF'}
                                        </button>
                                    </div>
                                    {showTax && <div className="mt-3"><Input label="% ITBIS" type="number" value={invoiceData.taxRate} onChange={v => handleInputChange('taxRate', v)} /></div>}
                                </div>

                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-zinc-200 space-y-3">
                                    <h2 className="text-[10px] font-black uppercase text-zinc-400 flex items-center gap-2"><Icons.User /> Cliente y Datos</h2>
                                    <Input label="Nº Factura" value={invoiceData.invoiceNumber} onChange={v => handleInputChange('invoiceNumber', v)} />
                                    <Input label="Orden Nº" value={invoiceData.orderNumber} onChange={v => handleInputChange('orderNumber', v)} />
                                    <Input label="Cliente" value={invoiceData.client.name} onChange={v => handleNestedChange('client', 'name', v)} />
                                    <Input label="Dirección" value={invoiceData.client.address} onChange={v => handleNestedChange('client', 'address', v)} />
                                    <Input label="Condiciones" value={invoiceData.conditions} onChange={v => handleInputChange('conditions', v)} />
                                </div>

                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-zinc-200">
                                    <div className="flex justify-between items-center mb-3">
                                        <h2 className="text-[10px] font-black uppercase text-zinc-400 flex items-center gap-2"><Icons.Package /> Artículos</h2>
                                        <button onClick={addItem} className="p-1 bg-black text-white rounded-lg"><Icons.Plus /></button>
                                    </div>
                                    <div className="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                                        {invoiceData.items.map((item, idx) => (
                                            <div key={item.id} className="p-3 bg-zinc-50 rounded-xl border border-zinc-100 relative">
                                                <button onClick={() => removeItem(item.id)} className="absolute top-2 right-2 text-zinc-300 hover:text-red-500"><Icons.Trash /></button>
                                                <Input label={`Art. ${idx + 1}`} value={item.description} onChange={v => updateItem(item.id, 'description', v)} />
                                                <div className="flex gap-2 mt-2">
                                                    <Input label="Cant." type="number" value={item.quantity} onChange={v => updateItem(item.id, 'quantity', v)} />
                                                    <Input label="Precio" type="number" value={item.price} onChange={v => updateItem(item.id, 'price', v)} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </aside>

                            <main className="lg:col-span-8 flex justify-center bg-zinc-200 p-4 rounded-3xl overflow-auto">
                                <div id="printable-invoice" className="bg-white text-black shadow-2xl" style={{ width: '210mm', minHeight: '297mm', padding: '15mm' }}>
                                    <div className="border-[3px] border-black rounded-[30px] p-8 mb-6">
                                        <div className="flex justify-between items-start">
                                            <h1 className="text-5xl font-black tracking-tighter">FACTURA</h1>
                                            <div className="text-right space-y-1">
                                                <div className="text-2xl font-bold">Nº {invoiceData.invoiceNumber || '---'}</div>
                                                <div className="text-xs font-bold uppercase">Fecha: {invoiceData.issueDate}</div>
                                                <div className="text-xs font-bold uppercase">Orden: {invoiceData.orderNumber || '---'}</div>
                                            </div>
                                        </div>
                                        <div className="mt-10 space-y-4">
                                            <div className="flex border-b border-black pb-1"><span className="text-[10px] font-black uppercase w-24">Cliente:</span><span className="text-sm uppercase font-medium">{invoiceData.client.name}</span></div>
                                            <div className="flex border-b border-black pb-1"><span className="text-[10px] font-black uppercase w-24">Dirección:</span><span className="text-sm uppercase font-medium">{invoiceData.client.address}</span></div>
                                            <div className="flex border-b border-black pb-1"><span className="text-[10px] font-black uppercase w-24">Condiciones:</span><span className="text-sm uppercase font-medium">{invoiceData.conditions}</span></div>
                                        </div>
                                    </div>

                                    <div className="border-[3px] border-black rounded-[30px] overflow-hidden mb-6 min-h-[400px]">
                                        <table className="w-full border-collapse">
                                            <thead>
                                                <tr className="border-b-[3px] border-black bg-zinc-50 text-[10px] font-black uppercase">
                                                    <th className="border-r-[3px] border-black p-3 w-16">Cant.</th>
                                                    <th className="border-r-[3px] border-black p-3 text-left">Descripción</th>
                                                    <th className="border-r-[3px] border-black p-3 w-28 text-right">Precio</th>
                                                    <th className="p-3 w-28 text-right">Total</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {invoiceData.items.map((item) => (
                                                    <tr key={item.id} className="border-b border-zinc-200 text-sm">
                                                        <td className="border-r-[3px] border-black p-3 text-center font-bold">{item.quantity}</td>
                                                        <td className="border-r-[3px] border-black p-3 uppercase">{item.description}</td>
                                                        <td className="border-r-[3px] border-black p-3 text-right">{item.price ? parseFloat(item.price).toLocaleString() : ''}</td>
                                                        <td className="p-3 text-right font-black">{(parseFloat(item.quantity || 0) * parseFloat(item.price || 0)).toLocaleString()}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>

                                    <div className="flex justify-end">
                                        <div className="w-64 border-[3px] border-black rounded-[20px] overflow-hidden font-black uppercase text-xs">
                                            <div className="flex justify-between p-3 border-b-2 border-black"><span>Sub-Total</span><span>{totals.subtotal.toLocaleString()}</span></div>
                                            {showTax && <div className="flex justify-between p-3 border-b-2 border-black"><span>ITBIS ({invoiceData.taxRate}%)</span><span>{totals.taxAmount.toLocaleString()}</span></div>}
                                            <div className="flex justify-between p-4 bg-zinc-100 text-base"><span>Total</span><span>{totals.total.toLocaleString()}</span></div>
                                        </div>
                                    </div>
                                </div>
                            </main>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
